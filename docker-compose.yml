# ──────────────────────────────────────────────
# F1 AI Race Engineer — Docker Compose
# ──────────────────────────────────────────────
# Single-service compose (no external databases needed).
# FAISS index and processed data persist via volume mount.

services:
  f1-engineer:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: f1-race-engineer
    ports:
      - "5000:5000"
    env_file:
      - backend/.env
    environment:
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      - FLASK_DEBUG=false
    volumes:
      # Persist cached data across container restarts
      - f1_data:/app/backend/data
    restart: unless-stopped
    healthcheck:
      # Liveness only — readiness is checked separately by the orchestrator
      # via /api/ready (which can return 503 without us restarting the box).
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:5000/api/health',timeout=5).status==200 else sys.exit(1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  f1_data:
    driver: local
